apiVersion: v1
kind: Namespace
metadata:
  name: sample-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: hashicorp/http-echo:0.2.3
          args:
            - -text=Hello, mTLS!
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: sample-app
spec:
  selector:
    app: sample-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sample-app-route
  namespace: sample-app
spec:
  hostnames:
    - mtls.test.local
  parentRefs:
    - name: gateway
      namespace: gateway
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
        headers:
          - type: RegularExpression
            name: x-forwarded-client-cert
            value: .+
      backendRefs:
        - name: sample-app
          namespace: sample-app
          port: 80
    - matches:
      - path:
          type: PathPrefix
          value: /nomtls
      backendRefs:
        - name: sample-app
          namespace: sample-app
          port: 80
    - matches:
      - path:
          type: PathPrefix
          value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: response-forbidden
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: response-forbidden
  namespace: sample-app
spec:
  directResponse:
    contentType: text/plain
    statusCode: 403
    body:
      type: Inline
      inline: |
        Forbidden: mTLS client certificate required.
